name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Derive release version from tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Tag must match vX.Y.Z, for example v1.2.3." >&2
            exit 1
          fi
          echo "RELEASE_TAG=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${BASH_REMATCH[1]}" >> "$GITHUB_ENV"

      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Set release version
        run: npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

      - name: Check and package
        run: npm run check

      - name: Attach release artifacts
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          artifacts: artifacts/clockboard-chromium-v${{ env.RELEASE_VERSION }}.zip,artifacts/clockboard-chromium-v${{ env.RELEASE_VERSION }}.zip.sha256
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
